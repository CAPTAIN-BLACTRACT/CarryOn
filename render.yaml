services:
  - type: web
    name: carryon-api
    runtime: node
    rootDir: api
    region: oregon
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-3.1-flash-lite
      - key: IMAGE_PROVIDER
        value: pexels
      - key: IMAGE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info
